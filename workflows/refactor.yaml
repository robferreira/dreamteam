name: refactor
description: Refatoração de código
needs_architecture_default: true
max_revisions: 2
required_agents:
  - architect
  - planner
  - reviewer
  - memory
specialists:
  - backend
  - frontend
models:
  architect:
    provider: openai
    model: gpt-4o
    temperature: 0.1
  backend:
    provider: anthropic
    model: claude-3-5-sonnet-20241022
    temperature: 0.2
  reviewer:
    provider: openai
    model: gpt-4o
    temperature: 0.0
