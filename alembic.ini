[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# URL sobrescrita em alembic/env.py a partir de DATABASE_URL_SYNC (.env)
sqlalchemy.url = postgresql+psycopg://dreamteam:dreamteam@127.0.0.1:5432/dreamteam

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
