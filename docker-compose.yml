services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dreamteam
      POSTGRES_PASSWORD: dreamteam
      POSTGRES_DB: dreamteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamteam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dreamteam:dreamteam@postgres:5432/dreamteam
      DATABASE_URL_SYNC: postgresql+psycopg://dreamteam:dreamteam@postgres:5432/dreamteam
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./workflows:/app/workflows
      - ./config:/app/config
      - ./projects:/app/projects

volumes:
  postgres_data:
